spring:
  application:
    name: analise-credito
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3

rabbitmq:
  propostaconcluida:
    exchange: proposta-concluida.ex
  queue:
    proposta:
      analise: proposta-pendente.ms-analise-credito
