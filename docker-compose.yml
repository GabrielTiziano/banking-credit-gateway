services:
  # ---------------- Infraestrutura ----------------
  postgres:
    image: postgres:16
    container_name: banking-postgres
    environment:
      POSTGRES_DB: banking_credit_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # Só marca "healthy" quando o Postgres aceita conexões.
      test: ["CMD-SHELL", "pg_isready -U postgres -d banking_credit_gateway"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banking-rabbitmq
    ports:
      - "5672:5672"    # protocolo AMQP (apps)
      - "15672:15672"  # painel de gerenciamento (navegador)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: banking-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns
      DEBUG: "0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------- Microsserviços ----------------
  proposta-app:
    build: ./proposta-app
    container_name: banking-proposta-app
    ports:
      - "8080:8080"
    environment:
      # Dentro da rede Docker os serviços se acham pelo NOME, não por localhost.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking_credit_gateway
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  analise-credito:
    build: ./analise-credito
    container_name: banking-analise-credito
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      # Sobe depois do proposta-app, que é quem declara filas/exchanges.
      proposta-app:
        condition: service_started
    restart: unless-stopped

  notificacao-app:
    build: ./notificacao-app
    container_name: banking-notificacao-app
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      AWS_REGION: us-east-1
      AWS_SNS_ENDPOINT: http://localstack:4566
    depends_on:
      rabbitmq:
        condition: service_healthy
      localstack:
        condition: service_healthy
      proposta-app:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
